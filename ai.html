<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Radinsdg AI</title>
    <link rel="stylesheet" href="ai.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="radinsdg.png" type="image/png">
    <link rel="apple-touch-icon" href="radinsdg.png">
</head>
<body>

    <div class="background-animation"></div>

    <div class="container">
        <header>
            <h1>Radinsdg</h1>
            <p>دستیار هوش مصنوعی رادین اس دی جی</p>
        </header>

        <div class="chat-box" id="chatBox">
            <div class="message ai-message">
                <span id="callname">سلام، من دستیار هوشمند هستم هر سوالی که داری در خدمتم</span>
            </div>
        </div>

        <!-- دکمه‌های سریع -->
        <div class="quick-buttons" id="quickButtons">
            <button class="quick-btn" data-question="چطور با سازنده ارتباط برقرار کنم؟">ارتباط با ما</button>
            <button class="quick-btn" data-question="نحوه نظر دهی به ویدیو هایی که میگزارید چطور است؟">نظردهی</button>
            <button class="quick-btn" data-question="چطور میتوان دوره مورد نظر خود را ذخیره کرد؟">ذخیره دوره</button>
            <button class="quick-btn" data-question="سازنده تو چه کسی بوده؟">سازنده</button>
            <button class="quick-btn" data-question="تو چطوری کار میکنی؟ چی هستی؟">نحوه کار تو</button>
            <button class="quick-btn" data-question="چطور وارد حساب کاربری بشوم؟">حساب کاربری</button>
            <button class="quick-btn" data-question="پروفایل من کجا ترمیم میشود؟">پروفایل</button>
        </div>

        <!--<div class="input-area">
            <button id="sendBtn"><i>S</i></button>
            <input type="text" id="userInput" placeholder="پیام خود را اینجا بنویسید..." autocomplete="off">
        </div>-->
    </div>

    <script src="ai.js"></script>
</body>
</html>
