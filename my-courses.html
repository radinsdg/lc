<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ff8c00">
    <title>دوره های من</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="radinsdg.png" type="image/png">
    <link rel="apple-touch-icon" href="radinsdg.png">
</head>
<body>
    <header>دوره های من</header>
    
    <div class="hlink">
        <a href="index.html" class="home item">خانه</a>
        <a href="sign.html" class="sign item" id="authBtn">ورود حساب</a>
        <a href="help.html" class="lmaker item">حمایت از ما</a>
    </div>
    <div class="calink">
        <a href="course.html" class="course item">دوره ها</a>
        <a href="ai.html" class="ai item">دستیار هوشمند</a>
    </div>   
    <br><br><br> 
    <strong>دوره های منتخب من</strong>
    <br><br>
    <div id="myCoursesList" style="text-align: center;">
        <!-- دوره‌های ذخیره شده اینجا نمایش داده می‌شوند -->
    </div>

    <script>
        // نمایش دوره‌های ذخیره شده
        function displayMyCourses() {
            const myCoursesList = document.getElementById('myCoursesList');
            const savedCourses = JSON.parse(localStorage.getItem('myCourses') || '[]');
            
            if (savedCourses.length === 0) {
                myCoursesList.innerHTML = `
                    <p style="font-size: 1.3em; background: rgba(0,0,0,0.7); padding: 20px; border-radius: 16px;">
                        شما هنوز دوره‌ای ذخیره نکرده‌اید<br>
                        برای ذخیره دوره، به صفحه <a href="course.html" style="color: gold;">دوره ها</a> بروید
                    </p>
                `;
                return;
            }

            let html = '';
            savedCourses.forEach((course, index) => {
                html += `
                    <div style="background: rgba(0,0,0,0.7); padding: 20px; border-radius: 16px; margin: 15px auto; max-width: 600px;">
                        <strong style="font-size: 1.5em; color: gold;">${course.title}</strong>
                        <p style="background: none; padding: 10px; font-size: 1em;">
                            ${course.description || 'توضیحی برای این دوره ثبت نشده است'}
                        </p>
                        <a href="${course.link}" style="display: inline-block; margin: 10px; padding: 10px 20px; background: green; color: white; text-decoration: none; border-radius: 30px;">مشاهده دوره</a>
                        <button onclick="removeCourse(${index})" style="display: inline-block; margin: 10px; padding: 10px 20px; background: red; color: white; border: none; border-radius: 30px; cursor: pointer;">حذف از دوره‌های من</button>
                    </div>
                `;
            });
            myCoursesList.innerHTML = html;
        }

        // حذف دوره از لیست
        function removeCourse(index) {
            let savedCourses = JSON.parse(localStorage.getItem('myCourses') || '[]');
            savedCourses.splice(index, 1);
            localStorage.setItem('myCourses', JSON.stringify(savedCourses));
            displayMyCourses(); // به‌روزرسانی لیست
            alert('دوره با موفقیت حذف شد!');
        }

        // بارگذاری لیست هنگام باز شدن صفحه
        window.onload = displayMyCourses;
    </script>
</body>
</html>
